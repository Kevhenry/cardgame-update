name: Build and Release Firmware

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        working-directory: .
        run: |
          # We need the actual project source - this will be a separate step
          echo "Building firmware requires the main project source"
          echo "This workflow should run from the main ESP32C3_Cards_WiFi repo"
          exit 1

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            firmware.bin
