name: Update OTA Manifest

on:
  repository_dispatch:
    types: [ota-release]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update ota.json
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          URL="${{ github.event.client_payload.url }}"
          
          cat > ota.json << EOM
          {
            "hasUpdate": true,
            "version": "$VERSION",
            "url": "$URL"
          }
          EOM
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add ota.json
          git commit -m "Update OTA manifest for $VERSION"
          git push
